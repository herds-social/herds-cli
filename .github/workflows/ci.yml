name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run pyright
        run: uv run pyright

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  version-guard:
    # PR-only: the guard diffs against github.base_ref, which is empty on push.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the guard runs `git merge-base` and
          # `git show <merge-base>:pyproject.toml`, which fail on shallow clones.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The script is deliberately stdlib-only (tomllib needs >= 3.11), so no
      # dependency install is needed.
      - name: Enforce version bump rules
        run: python3 scripts/version_guard.py --base "origin/${{ github.base_ref }}"
